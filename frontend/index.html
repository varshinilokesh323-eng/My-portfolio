<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 40px;
      text-align: center;
    }

    section {
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }

    h2 {
      color: #333;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #084298;
    }

    #response {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>My Portfolio</h1>
  <p>Full Stack Developer</p>
</header>

<section>
  <h2>About Me</h2>
  <div class="card">
    <p>
      I am a web developer skilled in frontend and backend technologies.
      This portfolio demonstrates database connectivity using MySQL.
    </p>
  </div>

  <h2>Contact Me</h2>
  <div class="card">
    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <textarea id="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <p id="response"></p>
  </div>
</section>

<script>
  document.getElementById("contactForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      message: document.getElementById("message").value
    };

    try {
      const res = await fetch("/api/contact", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const text = await res.text();
      document.getElementById("response").innerText = text;
    } catch (error) {
      document.getElementById("response").innerText = "Error connecting to server";
    }
  });
</script>

</body>
</html>
